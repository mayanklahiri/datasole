name: Nightly Dependency Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      # ── Check for outdated packages ────────────────────────────────
      - name: Check for updates
        id: ncu
        run: |
          HAS_UPDATES=false

          echo "### Root package" >> /tmp/ncu-report.txt
          ncu --peer --format group 2>&1 | tee -a /tmp/ncu-report.txt
          ncu --peer --errorLevel 2 2>/dev/null || HAS_UPDATES=true

          for d in demos/vanilla demos/react-express demos/vue-nestjs; do
            echo "" >> /tmp/ncu-report.txt
            echo "### $d" >> /tmp/ncu-report.txt
            (cd "$d" && ncu --peer --reject datasole --format group 2>&1 | tee -a /tmp/ncu-report.txt)
            (cd "$d" && ncu --peer --reject datasole --errorLevel 2 2>/dev/null) || HAS_UPDATES=true
          done

          if [ "$HAS_UPDATES" = "true" ]; then
            echo "updates=true" >> "$GITHUB_OUTPUT"
            echo "## Available updates" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ncu-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "updates=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Apply updates to root and all demos ────────────────────────
      - name: Apply updates
        if: steps.ncu.outputs.updates == 'true'
        run: |
          ncu -u --peer
          npm install
          for d in demos/vanilla demos/react-express demos/vue-nestjs; do
            echo "--- Updating $d ---"
            (cd "$d" && ncu -u --peer --reject datasole && npm install)
          done

      # ── Playwright browsers ────────────────────────────────────────
      - name: Cache Playwright browsers
        if: steps.ncu.outputs.updates == 'true'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.ncu.outputs.updates == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit)
        if: steps.ncu.outputs.updates == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Full quality gate (unit + e2e + bench) ─────────────────────
      - name: Run full quality gate with updated dependencies
        if: steps.ncu.outputs.updates == 'true'
        run: npm run gate:full

      # ── Build demo apps (validates demos still build after upgrades) ─
      - name: Build demo apps
        if: steps.ncu.outputs.updates == 'true'
        run: |
          for d in demos/react-express demos/vue-nestjs; do
            if [ -f "$d/package.json" ]; then
              echo "--- building $d ---"
              (cd "$d" && npm run build)
            fi
          done

      # ── Gate metrics summary ───────────────────────────────────────
      - name: Append gate metrics to summary
        if: steps.ncu.outputs.updates == 'true'
        run: |
          echo "## Quality gate results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/build-metrics.md ]; then
            cat reports/build-metrics.md >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Full gate (including benchmarks) passed with updated dependencies." >> "$GITHUB_STEP_SUMMARY"

      # ── Commit all updated artifacts and push ──────────────────────
      # [skip ci] prevents CI from re-running tests we just completed here.
      - name: Commit updated packages and gate baselines
        if: steps.ncu.outputs.updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage package manifests, locks, and any gate artifacts that changed.
          git add package.json package-lock.json
          git add demos/*/package.json demos/*/package-lock.json
          git add docs/public/metrics-history.json docs/public/screenshots/ || true
          if git diff --cached --quiet; then
            echo "No dependency or gate baseline changes to commit."
            exit 0
          fi
          git commit -m "chore(deps): upgrade all dependencies to latest compatible versions [skip ci]"
          git pull --rebase --autostash origin main
          git push origin main

      # ── Artifact uploads ───────────────────────────────────────────
      - name: Upload reports
        if: steps.ncu.outputs.updates == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: nightly-update-reports
          path: reports/
          if-no-files-found: ignore
