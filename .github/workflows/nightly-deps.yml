name: Nightly Dependency Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Check for updates
        id: ncu
        run: |
          HAS_UPDATES=false

          echo "### Root package" >> /tmp/ncu-report.txt
          ncu --format group 2>&1 | tee -a /tmp/ncu-report.txt
          ncu --errorLevel 2 2>/dev/null || HAS_UPDATES=true

          for d in demos/vanilla demos/react-express demos/vue-nestjs; do
            echo "" >> /tmp/ncu-report.txt
            echo "### $d" >> /tmp/ncu-report.txt
            (cd "$d" && ncu --reject datasole --format group 2>&1 | tee -a /tmp/ncu-report.txt)
            (cd "$d" && ncu --reject datasole --errorLevel 2 2>/dev/null) || HAS_UPDATES=true
          done

          if [ "$HAS_UPDATES" = "true" ]; then
            echo "updates=true" >> "$GITHUB_OUTPUT"
            echo "## Available updates" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ncu-report.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "updates=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates available." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Apply updates
        if: steps.ncu.outputs.updates == 'true'
        run: |
          ncu -u
          npm install
          for d in demos/vanilla demos/react-express demos/vue-nestjs; do
            echo "--- Updating $d ---"
            (cd "$d" && ncu -u --reject datasole && npm install)
          done

      - name: Cache Playwright browsers
        if: steps.ncu.outputs.updates == 'true'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.ncu.outputs.updates == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit)
        if: steps.ncu.outputs.updates == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run quality gate
        if: steps.ncu.outputs.updates == 'true'
        run: npm run gate

      - name: Append gate metrics to summary
        if: steps.ncu.outputs.updates == 'true'
        run: |
          echo "## Quality gate results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/build-metrics.md ]; then
            cat reports/build-metrics.md >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Quality gate passed with updated dependencies." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push to main
        if: steps.ncu.outputs.updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git add demos/*/package.json demos/*/package-lock.json
          git commit -m "chore(deps): nightly dependency update"
          git push origin main

      - name: Upload reports
        if: steps.ncu.outputs.updates == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: nightly-update-reports
          path: reports/
          if-no-files-found: ignore
