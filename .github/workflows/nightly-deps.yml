name: Nightly Dependency Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Check for updates
        id: ncu
        run: |
          # Capture upgrade report
          ncu --format group 2>&1 | tee /tmp/ncu-report.txt

          # Exit code 0 = no updates, non-zero = updates available
          if ncu --errorLevel 2 2>/dev/null; then
            echo "updates=false" >> $GITHUB_OUTPUT
            echo "No dependency updates available." >> $GITHUB_STEP_SUMMARY
          else
            echo "updates=true" >> $GITHUB_OUTPUT
            echo "## Available updates" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/ncu-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Apply updates
        if: steps.ncu.outputs.updates == 'true'
        id: apply
        run: |
          ncu -u
          npm install

          # Capture the diff for the PR body
          DIFF=$(git diff package.json | head -200)
          # Write to file for multi-line output
          echo "$DIFF" > /tmp/pkg-diff.txt

      - name: Install Playwright browsers
        if: steps.ncu.outputs.updates == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run quality gate
        if: steps.ncu.outputs.updates == 'true'
        id: gate
        run: npm run gate

      - name: Append gate metrics to summary
        if: steps.ncu.outputs.updates == 'true'
        run: |
          echo "## Quality gate results" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/build-metrics.md ]; then
            cat reports/build-metrics.md >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Quality gate passed with updated dependencies." >> $GITHUB_STEP_SUMMARY

      - name: Create pull request
        if: steps.ncu.outputs.updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/nightly-dep-update
          delete-branch: true
          title: 'chore(deps): nightly dependency update'
          body: |
            Automated nightly dependency update via [`npm-check-updates`](https://github.com/raineorshine/npm-check-updates).

            The full quality gate (`npm run gate`) passed after updating:
            format ✓ · lint ✓ · build ✓ · unit tests ✓ · e2e tests ✓ · metrics ✓ · docs ✓

            See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full gate output and build metrics.
          commit-message: 'chore(deps): nightly dependency update'
          labels: |
            dependencies
            automated

      - name: Upload reports
        if: steps.ncu.outputs.updates == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-update-reports
          path: reports/
          if-no-files-found: ignore
