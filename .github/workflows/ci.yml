name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Skip only known bot-produced sync commits that already passed the gate.
# Do not skip all [skip ci] commits, because local pre-push artifact sync
# commits can piggyback with real docs/code changes that still need CI/deploy.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip only known bot-only follow-up commits that already passed gate:full.
    if: >
      !contains(github.event.head_commit.message, 'sync CI gate baselines and e2e screenshots [skip ci]') &&
      !contains(github.event.head_commit.message, 'chore(deps): upgrade all dependencies to latest compatible versions [skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the artifact commit step can push cleanly.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # ── Root package ──────────────────────────────────────────────
      - name: Install root dependencies
        run: npm ci

      # ── Demo packages ─────────────────────────────────────────────
      - name: Install demo dependencies
        run: |
          for d in demos/vanilla demos/react-express demos/vue-nestjs; do
            if [ -f "$d/package.json" ]; then
              echo "--- npm ci in $d ---"
              (cd "$d" && npm ci)
            fi
          done

      # ── Playwright browsers ───────────────────────────────────────
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # ── Full quality gate (unit + e2e + bench) ─────────────────────
      - name: Run full quality gate
        run: npm run gate:full

      # ── Demo builds (after datasole is built by gate) ─────────────
      - name: Build demo apps
        run: |
          for d in demos/react-express demos/vue-nestjs; do
            if [ -f "$d/package.json" ] && (cd "$d" && npm run build --if-present 2>/dev/null); then
              echo "--- built $d ---"
            fi
          done

      # ── Metrics summary ────────────────────────────────────────────
      - name: Print build metrics
        if: always()
        run: |
          if [ -f reports/build-metrics.md ]; then
            cat reports/build-metrics.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No build metrics found" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Auto-commit updated gate artifacts back to main ───────────
      # Only from node-24 on direct pushes to main (not PRs) to avoid
      # duplicate commits from the matrix and spurious pushes from forks.
      - name: Sync gate baselines to main
        if: >
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          matrix.node-version == 24
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pull latest to avoid conflicts with concurrent commits.
          git pull --rebase origin main
          if ! git diff --quiet -- docs/public/metrics-history.json docs/public/screenshots/; then
            git add docs/public/metrics-history.json docs/public/screenshots/
            git commit -m "chore: sync CI gate baselines and e2e screenshots [skip ci]"
            git push origin main || echo "Push skipped — no changes or race condition, will sync on next run."
          else
            echo "No gate artifact changes to commit."
          fi

      # ── Artifact uploads ───────────────────────────────────────────
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reports-node-${{ matrix.node-version }}
          path: reports/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            test/e2e/reports/
          if-no-files-found: ignore

      - name: Upload coverage
        if: matrix.node-version == 24
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload docs site
        if: matrix.node-version == 24
        uses: actions/upload-artifact@v5
        with:
          name: docs-site
          path: docs-site/dist/
          if-no-files-found: warn

  deploy-docs:
    needs: gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download docs site artifact
        uses: actions/download-artifact@v5
        with:
          name: docs-site
          path: _site/

      - name: Add .nojekyll
        run: touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
