name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run quality gate
        run: npm run gate

      - name: Print build metrics
        if: always()
        run: |
          if [ -f reports/build-metrics.md ]; then
            cat reports/build-metrics.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No build metrics found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-node-${{ matrix.node-version }}
          path: reports/
          if-no-files-found: ignore

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload docs site
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site/dist/
          if-no-files-found: ignore
