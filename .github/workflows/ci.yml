name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    if: >-
      github.event_name != 'push' ||
      (
        !contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, 'skip-ci')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # GITHUB_TOKEN + bot author/committer → pushes are authenticated by GitHub; commits show Verified (no signing keys).
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            demos/vanilla/package-lock.json
            demos/react-express/package-lock.json
            demos/vue-nestjs/package-lock.json

      - name: Install all packages
        run: npm run install:all

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json', 'demos/vanilla/package-lock.json', 'demos/react-express/package-lock.json', 'demos/vue-nestjs/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run exhaustive verification
        run: npm run gate:full

      - name: Commit verified generated artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No generated artifact changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .

          if git diff --cached --quiet; then
            echo "No staged changes after git add."
            exit 0
          fi

          printf '%s\n' \
            'chore(ci): publish verified generated artifacts [skip ci]' \
            '' \
            'Preserve the artifacts produced by the exhaustive main-branch verification run so' \
            'the repository, screenshots, and metrics stay aligned with the exact code that' \
            'just passed the full build, demo, end-to-end, and performance pipeline.' \
            > /tmp/ci-artifact-commit.txt
          # Skip hooks: pre-commit and pre-push run `npm run gate` which `clean`s
          # docs-site/dist and would leave nothing for the docs-site artifact upload below.
          git commit --no-verify -F /tmp/ci-artifact-commit.txt
          git push --no-verify origin HEAD:main

      - name: Print build metrics
        if: always()
        run: |
          if [ -f reports/build-metrics.md ]; then
            cat reports/build-metrics.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No build metrics found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: reports
          path: reports/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            test-results/
            test/e2e/reports/
          if-no-files-found: ignore

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload docs site
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: docs-site
          path: docs-site/dist/
          if-no-files-found: warn

  deploy-docs:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download docs site artifact
        uses: actions/download-artifact@v6
        with:
          name: docs-site
          path: _site/

      - name: Add .nojekyll
        run: touch _site/.nojekyll

      # v4 of upload-pages-artifact omits dotfiles (e.g. `.nojekyll`); keep v3 so `_site/.nojekyll` deploys.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
