name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run quality gate
        run: npm run gate

      - name: Print build metrics
        if: always()
        run: |
          if [ -f reports/build-metrics.md ]; then
            cat reports/build-metrics.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No build metrics found" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-node-${{ matrix.node-version }}
          path: reports/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            test/e2e/reports/
          if-no-files-found: ignore

      - name: Upload coverage
        if: matrix.node-version == 24
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Upload docs site
        if: matrix.node-version == 24
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site/dist/
          if-no-files-found: warn

  deploy-docs:
    needs: gate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: deploy-docs
      cancel-in-progress: false
    steps:
      - name: Download docs site artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: _site/

      - name: Add .nojekyll
        run: touch _site/.nojekyll

      - name: Deploy to gh-pages branch
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: deploy from ${GITHUB_SHA::8}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
